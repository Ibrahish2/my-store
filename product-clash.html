<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>حساب كلاش اوف كلانس - التفاصيل</title>
    <style>
        /* تنسيق خاص لصفحة المنتج */
        .product-page-container {
            max-width: 1200px;
            margin: 20px auto;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            padding: 0 20px;
        }

        .image-gallery {
            flex: 1 1 500px;
        }

        .main-image {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .thumbs {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .thumb {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid transparent;
        }

            .thumb:hover {
                border-color: #2563eb;
            }

        .product-details {
            flex: 1 1 500px;
        }

            .product-details h1 {
                font-size: 32px;
                color: #1e293b;
            }

        .details-list {
            list-style: none;
            padding: 0;
            margin-top: 20px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

            .details-list li {
                padding: 10px 0;
                border-bottom: 1px solid #f1f5f9;
                color: #475569;
            }

                .details-list li b {
                    color: #1e293b;
                }
    </style>
</head>
<body>

    <header>
        <h1>🎮 تفاصيل الحساب الرقمي</h1>
        <p>مراجعة شاملة لبيانات حساب كلاش اوف كلانس</p>
    </header>

    <main class="product-page-container">

        <!-- قسم معرض الصور المطور لحساب كلاش - تم تصحيحه لجعل الصور قابلة للضغط -->
        <div class="image-gallery" style="text-align: center;">

            <!-- الصورة الكبيرة الرئيسية المرفوعة على جهازك - أضفنا لها ID فريد -->
            <img src="clash.png.png" alt="الصورة الرئيسية للقرية" class="main-image" id="current-main-img" style="width: 100%; max-width: 500px; height: auto; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: all 0.3s ease;">

            <!-- الصور المصغرة الإضافية بالأسفل - أضفنا لها تنسيق الـ Cursor -->
            <div class="thumbs" style="display: flex; gap: 10px; margin-top: 15px; justify-content: center;">

                <!-- الصورة المصغرة الأولى (النشطة افتراضياً) - أضفنا cursor: pointer -->
                <img src="clash.png.png" alt="صورة القرية" class="thumb active-thumb"
                     onclick="changeImage('clash.png.png')"
                     style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #2563eb; transition: all 0.2s ease;">

                <!-- الصورة المصغرة الثانية -->
                <img src="army.png" alt="صورة الجنود" class="thumb"
                     onclick="changeImage('army.png')"
                     style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s ease;">

                <!-- الصورة المصغرة الثالثة -->
                <img src="hero.png" alt="صورة الابطال" class="thumb"
                     onclick="changeImage('hero.png')"
                     style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s ease;">

            </div>
        </div>

        <div class="product-details">
            <h1>حساب كلاش اوف كلانس لفل عالي</h1>
            <p class="price" style="font-size: 24px; margin: 10px 0;">السعر: 18,000 دينار</p>

            <ul class="details-list">
                <li><b>🏰 لفل القرية الرئيسي:</b> 165</li>
                <li><b>⭐ لفل قاعة المدينة (Town Hall):</b> 16</li>
                <li><b>💎 الجواهر المتاحة:</b> 606</li>
                <li><b> الملك والملكة:</b> لفل 78 / 90</li>
            </ul>

            <div style="margin-top: 30px; display: flex; gap: 15px; align-items: center;">
                <a href="index.html" style="text-align: center; text-decoration: none; width: 50%; background-color: #64748b; color: white; padding: 10px 0; border-radius: 6px; font-weight: bold;">الرجوع للمتجر</a>
                <a href="checkout.html" style="text-align: center; text-decoration: none; width: 50%; background-color: #2563eb; color: white; padding: 10px 0; border-radius: 6px; font-weight: bold;">شراء الآن</a>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        // دالة لتغيير الصورة الرئيسية عند الضغط على الصور المصغرة
        function changeImage(imageSrc) {
            // 1. تغيير مصدر الصورة الرئيسية الكبيرة
            const mainImg = document.getElementById('current-main-img');
            mainImg.style.opacity = '0.7'; // تأثير انتقال بسيط

            // انتظر قليلاً ثم غير الصورة وأعد الشفافية
            setTimeout(() => {
                mainImg.src = imageSrc;
                mainImg.style.opacity = '1';
            }, 150);

            // 2. تحديث الإطارات الزرقاء على الصور المصغرة
            const thumbs = document.querySelectorAll('.thumb');
            thumbs.forEach(thumb => {
                // قارن مصدر الصورة المصغرة مع مصدر الصورة الجديدة
                // ملاحظة: قد تحتاج لمقارنة الاسم المباشر إذا لم تنجح المقارنة الكاملة
                if (thumb.getAttribute('src') === imageSrc) {
                    thumb.style.borderColor = '#2563eb'; // إطار أزرق للصورة النشطة
                    thumb.classList.add('active-thumb');
                } else {
                    thumb.style.borderColor = 'transparent'; // إزالة الإطار
                    thumb.classList.remove('active-thumb');
                }
            });
        }
    </script>
</body>
</html>
