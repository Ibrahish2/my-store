<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>متجر الإلكتروني للحسابات</title>
    <style>
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .cart-content {
            background: white;
            width: 90%;
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 12px;
            text-align: right;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
            padding: 10px 0;
        }

        .close-cart {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header style="background: linear-gradient(135deg, #0f172a, #1e293b); color: white; padding: 35px 20px; border-bottom: 4px solid #2563eb; text-align: center;">
        <h1 style="font-size: 46px; margin: 0 0 10px 0; font-weight: 800; letter-spacing: 1px;">
            🎮 <span style="color: #2563eb;">Game</span>Flix
        </h1>
        <p style="color: #94a3b8; font-size: 15px; margin: 0; font-weight: 500;">والكتب التراثية</p>
    </header>

    <main>
        <section class="category-section">
            <h2>🎮 حسابات ألعاب</h2>
            <div class="product-grid">
                <div class="product-card">
                    <a href="product.html?id=1" style="text-decoration: none; color: inherit;">
                        <img src="clash.png.png" alt="حساب لعبة">
                        <h3>حساب كلاش اوف كلانسt.16</h3>
                    </a>
                    <p class="price">السعر: <span class="num-price">18000</span> دينار</p>
                </div>
                <div class="product-card">
                    <a href="product.html?id=2" style="text-decoration: none; color: inherit;">
                        <img src="clash2.png" alt="حساب لعبة">
                        <h3>حساب كلاش اوف كلانسt.12</h3>
                    </a>
                    <p class="price">السعر: <span class="num-price">8000</span> دينار</p>
                </div>
            </div>
        </section>
    </main>

    <div id="cartModal" class="cart-modal">
        <div class="cart-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>🛍️ سلة مشترياتك</h2>
                <button class="close-cart" id="close-cart-btn">إغلاق X</button>
            </div>
            <hr>
            <div id="cart-items-container">
                <p style="color: #64748b; text-align: center;">السلة فارغة حالياً...</p>
            </div>
            <hr>
            <div style="display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; margin-top: 15px;">
                <span>المجموع الكلي:</span>
                <span><span id="cart-total-price">0</span> دينار</span>
            </div>
            <a href="checkout.html" class="button" style="display: block; text-align: center; text-decoration: none; margin-top: 15px; padding: 12px; background: #22c55e; color: white; border-radius: 6px; font-weight: bold;">الانتقال للدفع والشراء 💳</a>
        </div>
    </div>

    <footer>
        <p>جميع الحقوق محفوظة © 2026</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
